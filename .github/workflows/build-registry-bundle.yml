name: Build Registry Bundle

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Validate registry
        run: python3 -m src.commands.validate_toolcards

      - name: Build bundle
        run: python3 -m src.commands.build_registry_bundle

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: registry-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
